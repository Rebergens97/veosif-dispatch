name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Digital Ocean Droplet
    runs-on: ubuntu-latest

    steps:
      - name: Validate Secrets
        run: |
          missing=""
          if [ -z "${{ secrets.DO_HOST }}" ]; then missing="$missing DO_HOST"; fi
          if [ -z "${{ secrets.DO_USERNAME }}" ]; then missing="$missing DO_USERNAME"; fi
          if [ -z "${{ secrets.DO_SSH_KEY }}" ]; then missing="$missing DO_SSH_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Go to Settings → Secrets and variables → Actions to configure them."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            echo "=== Deploy started at $(date) ==="

            cd /opt/fleetbase

            echo "--- Pulling latest code ---"
            git pull origin main || { echo "git pull failed"; exit 1; }
            git submodule update --init --recursive || true

            if [ ! -f api/.env ]; then
              echo "ERROR: api/.env missing on server"
              exit 1
            fi

            echo "--- Building Docker images ---"
            docker compose -f docker-compose.yml -f docker-compose.production.yml build console httpd

            echo "--- Starting services ---"
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

            echo "--- Waiting for application ---"
            sleep 15

            echo "--- Running migrations ---"
            docker compose exec -T application php artisan migrate --force || true

            echo "--- Seeding ---"
            docker compose exec -T application php artisan fleetbase:seed 2>/dev/null || true
            docker compose exec -T application php artisan fleetbase:create-permissions 2>/dev/null || true

            echo "--- Optimizing ---"
            docker compose exec -T application php artisan queue:restart || true
            docker compose exec -T application php artisan cache:clear || true
            docker compose exec -T application php artisan config:cache || true
            docker compose exec -T application php artisan route:cache || true

            echo "--- Cleanup ---"
            docker image prune -f

            echo "=== Deploy completed at $(date) ==="

      - name: Deploy Result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy successful"
          else
            echo "Deploy failed — check the SSH step logs above"
          fi
