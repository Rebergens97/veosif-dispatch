# =============================================================================
# Nginx - Fleetbase API (Backend)
# Domain: api.veosifwork.com
# Proxied to: Docker container httpd on port 8000
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name api.veosifwork.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.veosifwork.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/api.veosifwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.veosifwork.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Sekirite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/fleetbase-api-access.log;
    error_log  /var/log/nginx/fleetbase-api-error.log;

    # Limite upload size
    client_max_body_size 600M;

    # Timeout pou long requests
    proxy_connect_timeout 600s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Preflight OPTIONS
    location = /preflight {
        internal;
        add_header Access-Control-Allow-Origin "https://veosifwork.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN, X-Socket-ID, Accept, Origin, X-Fleetbase-Session" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Proxy → Docker httpd (port 8000)
    location / {
        # CORS headers — toujou retounen, menm sou 500 errors
        add_header Access-Control-Allow-Origin "https://veosifwork.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN, X-Socket-ID, Accept, Origin, X-Fleetbase-Session" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "x-compressed-json, access-console-sandbox, access-console-sandbox-key, content-disposition" always;

        # Reponn OPTIONS dirèkteman san proxy
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://veosifwork.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN, X-Socket-ID, Accept, Origin, X-Fleetbase-Session" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }
}
