# =============================================================================
# Nginx - Fleetbase SocketCluster (WebSocket)
# Domain: socket.veosifwork.com
# Proxied to: Docker container socket on port 38000
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name socket.veosifwork.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name socket.veosifwork.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/socket.veosifwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socket.veosifwork.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    # Logs
    access_log /var/log/nginx/fleetbase-socket-access.log;
    error_log  /var/log/nginx/fleetbase-socket-error.log;

    # Proxy → Docker SocketCluster (port 38000)
    location / {
        proxy_pass         http://127.0.0.1:38000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (kritikal!)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket timeout - koneksyon yo ka dire lontan
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;

        # Disable buffering pou WebSocket
        proxy_buffering off;
    }
}
